<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <linearGradient id="portalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#FFE033" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon: Portal / Play Button -->
  <circle cx="40" cy="40" r="30" fill="#6A0DAD" stroke="url(#portalGrad)" stroke-width="4" filter="url(#glow)"/>
  <polygon points="32,25 32,55 55,40" fill="url(#portalGrad)"/>
  <circle cx="40" cy="40" r="20" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>
  
  <!-- Text -->
  <text x="85" y="52" font-family="'Rubik', sans-serif" font-weight="800" font-size="38" fill="#FFFFFF">
    Reel<tspan fill="url(#portalGrad)">Sorte</tspan>
  </text>
  <text x="88" y="68" font-family="'Nunito', sans-serif" font-weight="600" font-size="12" fill="#E5E7EB" letter-spacing="2">
    ENTERTAINMENT PORTAL
  </text>
</svg>