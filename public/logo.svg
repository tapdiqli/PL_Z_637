<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="100%" height="100%">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#5B21B6" />
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- Icon Part -->
  <g transform="translate(10, 10)" filter="url(#shadow)">
    <!-- Film Reel Outer -->
    <circle cx="50" cy="50" r="45" fill="url(#purpleGrad)" />
    <circle cx="50" cy="50" r="35" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-dasharray="10 6" />
    
    <!-- Play Button / Star Center -->
    <path d="M42 35 L65 50 L42 65 Z" fill="url(#yellowGrad)" />
    
    <!-- Decorative Stars -->
    <path d="M25 25 L30 15 L35 25 L45 30 L35 35 L30 45 L25 35 L15 30 Z" fill="#FBBF24" transform="scale(0.5) translate(20, 20)" />
    <path d="M75 75 L80 65 L85 75 L95 80 L85 85 L80 95 L75 85 L65 80 Z" fill="#FBBF24" transform="scale(0.4) translate(110, 110)" />
  </g>

  <!-- Text Part -->
  <g transform="translate(120, 75)">
    <text font-family="Rubik, sans-serif" font-weight="800" font-size="56" fill="#1F2937" letter-spacing="-1">
      Reel<tspan fill="url(#purpleGrad)">Sorte</tspan>
    </text>
    <circle cx="265" cy="-40" r="6" fill="#FBBF24" />
  </g>
</svg>